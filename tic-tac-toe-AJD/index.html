<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tic-Tac-Toe — AJD</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app" id="app">
        <header class="header">
            <h1 class="header__title">Tres en raya</h1>
            <p class="header__meta">Jugador: <span class="header__tag">X</span> — Máquina: <span class="header__tag">O</span></p>
        </header>

        <section class="controls" aria-label="Configuración de partida">
            <label class="field">
                <span class="field__label">Dificultad de la máquina</span>
                <select id="difficulty" class="field__select" aria-describedby="diff-hint">
                    <option value="easy">Fácil — movimientos aleatorios</option>
                    <option value="medium" selected>Medio — heurísticas básicas</option>
                    <option value="hard">Difícil — juego óptimo (minimax)</option>
                </select>
            </label>
            <p id="diff-hint" class="field__hint">Elige antes de comenzar o al reiniciar. El primer turno es siempre tuyo (X).</p>
            <button type="button" class="btn btn--secondary" id="btnNewGame">Nueva partida</button>
        </section>

        <p class="status" id="status" role="status" aria-live="polite">Tu turno — juega una casilla con X</p>

        <div
            class="board"
            id="board"
            role="group"
            aria-label="Tablero de tres en raya, nueve casillas"
        >
        </div>

        <p class="footer-hint" id="footer-hint" aria-hidden="true">Clic o Enter en casillas vacías. La máquina responde al instante.</p>
    </main>
    <script src="app.js" defer></script>
</body>
</html>
